# Chaque push sur `main` build le site (Vite) et publie sur GitHub Pages (source : GitHub Actions).
#
# Prérequis une fois sur le dépôt GitHub :
#   Settings → Pages → Build and deployment → Source : UNIQUEMENT « GitHub Actions »
#   (Si « Deploy from a branch » reste actif, GitHub sert l’index.html à la racine du repo avec
#   <script src="/src/main.jsx"> → 404 → page blanche. Le workflow publie le contenu de ./dist.)
#   Settings → Environments → github-pages → autoriser les déploiements depuis la branche « main »
#
name: Deploy to GitHub Pages

run-name: "Pages — ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
